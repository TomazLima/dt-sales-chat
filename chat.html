<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DT Sales Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs" type="module" id="pdfjs-script"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --magenta:      #E20074;
      --magenta-dark: #B50060;
      --bg:           #F2F2F2;
      --surface:      #FFFFFF;
      --text:         #1A1A1A;
      --text-muted:   #6B6B6B;
      --border:       #E0E0E0;
      --bot-bg:       #FFFFFF;
      --user-bg:      #E20074;
      --user-text:    #FFFFFF;
      --radius:       16px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: var(--magenta);
      color: #fff;
      padding: 0 20px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    .header-brand { display: flex; align-items: center; gap: 10px; }
    .header-logo {
      width: 32px; height: 32px;
      background: #fff;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; color: var(--magenta);
      letter-spacing: -0.5px;
    }
    .header-title { font-weight: 600; font-size: 15px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    #header-user { font-size: 13px; opacity: .85; }
    #btn-new-chat {
      background: rgba(255,255,255,.2);
      border: 1px solid rgba(255,255,255,.4);
      color: #fff;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: background .2s;
    }
    #btn-new-chat:hover { background: rgba(255,255,255,.35); }

    /* ── TELAS ── */
    .screen { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .screen[hidden] { display: none; }

    /* ── TELA DE LOGIN ── */
    #login-screen {
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    .login-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 36px 32px;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .login-logo {
      width: 48px; height: 48px;
      background: var(--magenta);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 18px; color: #fff;
      margin-bottom: 20px;
    }
    .login-card h2 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
    .login-card p  { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .form-group label { font-size: 13px; font-weight: 500; color: var(--text); }
    .form-group input {
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus { border-color: var(--magenta); }
    #btn-login {
      width: 100%;
      padding: 12px;
      background: var(--magenta);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background .2s;
    }
    #btn-login:hover    { background: var(--magenta-dark); }
    #btn-login:disabled { background: #BDBDBD; cursor: default; }
    #login-error {
      font-size: 13px; color: #D32F2F;
      background: #FFF3F3; border: 1px solid #FFCDD2;
      border-radius: 8px; padding: 10px 12px;
      margin-top: 14px; display: none;
    }
    #login-error.visible { display: block; }

    /* Logout button */
    #btn-logout {
      background: rgba(255,255,255,.2);
      border: 1px solid rgba(255,255,255,.4);
      color: #fff; padding: 5px 12px;
      border-radius: 20px; font-size: 12px;
      font-family: inherit; cursor: pointer;
      transition: background .2s;
    }
    #btn-logout:hover { background: rgba(255,255,255,.35); }

    /* ── TELA DE CHAT ── */
    #chat-screen { background: var(--bg); }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    /* Bolhas */
    .msg-row {
      display: flex;
      gap: 8px;
      max-width: 75%;
    }
    .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.bot  { align-self: flex-start; }

    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      flex-shrink: 0; align-self: flex-end;
    }
    .bot  .msg-avatar { background: var(--magenta); color: #fff; }
    .user .msg-avatar { background: #1A1A1A; color: #fff; }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.55;
    }
    .bot  .msg-bubble { background: var(--bot-bg); color: var(--text); border-bottom-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .bot .msg-bubble p { margin: 0 0 8px; }
    .bot .msg-bubble p:last-child { margin-bottom: 0; }
    .bot .msg-bubble ul, .bot .msg-bubble ol { margin: 4px 0 8px 18px; }
    .bot .msg-bubble li { margin-bottom: 3px; }
    .bot .msg-bubble strong { font-weight: 600; }
    .bot .msg-bubble h1, .bot .msg-bubble h2, .bot .msg-bubble h3 { font-size: 14px; font-weight: 600; margin: 8px 0 4px; }
    .user .msg-bubble { background: var(--user-bg); color: var(--user-text); border-bottom-right-radius: 4px; }

    .msg-meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .user .msg-meta { text-align: right; }

    /* Fontes */
    .msg-sources {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      display: flex; flex-wrap: wrap; gap: 4px;
    }
    .source-tag {
      background: #F0F0F0;
      border: 1px solid var(--border);
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 11px;
    }

    /* Typing indicator */
    #typing-indicator {
      align-self: flex-start;
      display: none;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }
    #typing-indicator.visible { display: flex; }
    .typing-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--magenta);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .typing-dots {
      background: var(--bot-bg);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      display: flex; gap: 5px; align-items: center;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .typing-dots span {
      width: 7px; height: 7px;
      background: #BDBDBD;
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    /* Attachment chip */
    #attachment-bar {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 16px 0;
      background: var(--surface);
    }
    #attachment-bar.visible { display: flex; }
    .attach-chip {
      display: flex; align-items: center; gap: 6px;
      background: #F0F0F0;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px 4px 8px;
      font-size: 12px; color: var(--text);
    }
    .attach-chip span { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .attach-remove {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 14px; line-height: 1;
      padding: 0 0 0 2px;
    }
    .attach-remove:hover { color: var(--magenta); }

    /* Input area */
    #input-area {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* Attach button */
    #btn-attach {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: none;
      border: 1.5px solid var(--border);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; color: var(--text-muted);
      transition: border-color .2s, color .2s;
    }
    #btn-attach:hover { border-color: var(--magenta); color: var(--magenta); }
    #btn-attach svg { width: 16px; height: 16px; }
    #file-input { display: none; }
    #msg-input {
      flex: 1;
      resize: none;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.5;
      outline: none;
      max-height: 120px;
      overflow-y: auto;
      transition: border-color .2s;
    }
    #msg-input:focus { border-color: var(--magenta); }
    #msg-input::placeholder { color: #BDBDBD; }
    #btn-send {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--magenta);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .2s, transform .1s;
    }
    #btn-send:hover   { background: var(--magenta-dark); }
    #btn-send:active  { transform: scale(.93); }
    #btn-send:disabled { background: #BDBDBD; cursor: default; transform: none; }
    #btn-send svg { width: 18px; height: 18px; fill: #fff; }

    /* Toast de erro */
    #toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff;
      padding: 10px 20px; border-radius: 8px;
      font-size: 13px; opacity: 0;
      transition: opacity .3s;
      pointer-events: none; z-index: 100;
    }
    #toast.show { opacity: 1; }

    /* Mensagem de boas-vindas */
    .welcome-msg {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      padding: 24px 16px;
      flex-shrink: 0;
    }
    .welcome-msg strong { color: var(--text); }
  </style>
</head>
<body>

<!-- ── HEADER ───────────────────────────────────────────────── -->
<header>
  <div class="header-brand">
    <div class="header-logo">DT</div>
    <span class="header-title">Sales Assistant</span>
  </div>
  <div class="header-right">
    <span id="header-user"></span>
    <button id="btn-new-chat" hidden>↺ Nova conversa</button>
    <button id="btn-logout" hidden>Sair</button>
  </div>
</header>

<!-- ── TELA: LOGIN ───────────────────────────────────────────── -->
<div id="login-screen" class="screen">
  <div class="login-card">
    <div class="login-logo">DT</div>
    <h2>Entrar</h2>
    <p>Acesse o DT Sales Assistant</p>
    <div class="form-group">
      <label for="input-email">Email</label>
      <input type="email" id="input-email" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="input-password">Senha</label>
      <input type="password" id="input-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button id="btn-login">Entrar</button>
    <div id="login-error"></div>
    <div id="user-list" style="display:none">
    </div>
  </div>
</div>

<!-- ── TELA: CHAT ────────────────────────────────────────────── -->
<div id="chat-screen" class="screen" hidden>
  <div id="messages">
    <div class="welcome-msg">
      Olá, <strong id="welcome-name"></strong>! Como posso ajudar você hoje?
    </div>

    <!-- Typing indicator -->
    <div id="typing-indicator">
      <div class="typing-avatar">DT</div>
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <div id="attachment-bar">
    <div class="attach-chip">
      <span>📄 </span><span id="attach-name"></span>
      <button class="attach-remove" id="btn-remove-attach" title="Remover">✕</button>
    </div>
  </div>

  <div id="input-area">
    <input type="file" id="file-input" accept=".pdf,.txt,.md">
    <button id="btn-attach" title="Anexar arquivo (PDF, TXT)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66L9.41 17.41a2 2 0 01-2.83-2.83l8.49-8.48"/>
      </svg>
    </button>
    <textarea id="msg-input" rows="1" placeholder="Digite sua mensagem..."></textarea>
    <button id="btn-send" title="Enviar">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  // ── CONFIG ──────────────────────────────────────────────────────────────────
  const API_BASE = 'https://dtgbsn8n.eastus.cloudapp.azure.com/webhook';
  const API_KEY  = 'dt-sales-a7f3c9e2b1d48520';

  let currentUser = null; // { id, name, email }

  // ── API ─────────────────────────────────────────────────────────────────────
  async function apiCall(endpoint, body) {
    const res = await fetch(`${API_BASE}/${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  // ── SESSÃO ──────────────────────────────────────────────────────────────────
  function getSessionId(userId) {
    const key = `dt_session_${userId}`;
    let sid = localStorage.getItem(key);
    if (!sid) {
      sid = `u${userId}-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`;
      localStorage.setItem(key, sid);
    }
    return sid;
  }

  async function clearSession() {
    if (!currentUser) return;
    const sid = getSessionId(currentUser.id);
    try {
      await apiCall('users', { action: 'clear_session', session_id: sid });
    } catch(e) { /* silencia */ }
    localStorage.removeItem(`dt_session_${currentUser.id}`);
    // Limpa mensagens da tela
    const msgs = document.getElementById('messages');
    while (msgs.firstChild && msgs.firstChild !== typingIndicator) {
      msgs.removeChild(msgs.firstChild);
    }
    msgs.insertBefore(welcomeDiv, typingIndicator);
    showToast('Conversa reiniciada');
  }

  // ── LOGIN ────────────────────────────────────────────────────────────────────
  const loginError  = document.getElementById('login-error');
  const btnLogin    = document.getElementById('btn-login');
  const inputEmail  = document.getElementById('input-email');
  const inputPwd    = document.getElementById('input-password');

  function showLoginError(msg) {
    loginError.textContent = msg;
    loginError.classList.add('visible');
  }
  function hideLoginError() { loginError.classList.remove('visible'); }

  async function doLogin() {
    const email    = inputEmail.value.trim();
    const password = inputPwd.value;
    if (!email || !password) { showLoginError('Preencha email e senha.'); return; }

    btnLogin.disabled = true;
    btnLogin.textContent = 'Entrando...';
    hideLoginError();

    try {
      const data = await apiCall('users', { action: 'login', email, password });
      if (data.success && data.user) {
        localStorage.setItem('dt_current_user', JSON.stringify(data.user));
        inputPwd.value = '';
        startChat(data.user);
      } else {
        showLoginError(data.error || 'Email ou senha incorretos.');
      }
    } catch(e) {
      showLoginError('Erro de conexão. Tente novamente.');
    } finally {
      btnLogin.disabled = false;
      btnLogin.textContent = 'Entrar';
    }
  }

  function doLogout() {
    localStorage.removeItem('dt_current_user');
    currentUser = null;
    document.getElementById('chat-screen').hidden = true;
    document.getElementById('login-screen').hidden = false;
    document.getElementById('btn-new-chat').hidden = true;
    document.getElementById('btn-logout').hidden = true;
    document.getElementById('header-user').textContent = '';
    inputEmail.value = '';
    inputPwd.value = '';
    hideLoginError();
    // Limpa mensagens
    const msgs = document.getElementById('messages');
    while (msgs.firstChild && msgs.firstChild !== typingIndicator) msgs.removeChild(msgs.firstChild);
    msgs.insertBefore(welcomeDiv, typingIndicator);
  }

  function startChat(user) {
    currentUser = user;
    document.getElementById('header-user').textContent = user.name;
    document.getElementById('welcome-name').textContent = user.name.split(' ')[0];
    document.getElementById('btn-new-chat').hidden = false;
    document.getElementById('btn-logout').hidden = false;
    document.getElementById('login-screen').hidden = true;
    document.getElementById('chat-screen').hidden = false;
    document.getElementById('msg-input').focus();
  }

  // ── CHAT ────────────────────────────────────────────────────────────────────
  const messagesEl     = document.getElementById('messages');
  const typingIndicator = document.getElementById('typing-indicator');
  const welcomeDiv     = messagesEl.querySelector('.welcome-msg');
  const input          = document.getElementById('msg-input');
  const btnSend        = document.getElementById('btn-send');

  function timeStr() {
    return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  function addMessage(role, text, sources) {
    const isUser = role === 'user';
    const initials = isUser
      ? currentUser.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase()
      : 'DT';

    const row = document.createElement('div');
    row.className = `msg-row ${isUser ? 'user' : 'bot'}`;

    let sourcesHtml = '';
    if (sources && sources.length > 0) {
      const tags = sources.map(s => `<span class="source-tag">📄 ${s}</span>`).join('');
      sourcesHtml = `<div class="msg-sources">${tags}</div>`;
    }

    row.innerHTML = `
      <div class="msg-avatar">${initials}</div>
      <div>
        <div class="msg-bubble">${isUser ? escapeHtml(text) : renderMarkdown(text)}</div>
        ${sourcesHtml}
        <div class="msg-meta">${timeStr()}</div>
      </div>`;

    messagesEl.insertBefore(row, typingIndicator);
    scrollToBottom();
  }

  function setTyping(visible) {
    typingIndicator.classList.toggle('visible', visible);
    scrollToBottom();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  function renderMarkdown(str) {
    return str
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.*?)\*/g,'<em>$1</em>')
      .replace(/^#{1,3} (.+)$/gm,'<strong>$1</strong>')
      .replace(/^[-*] (.+)$/gm,'<li>$1</li>')
      .replace(/(<li>.*<\/li>)/s,'<ul>$1</ul>')
      .replace(/\n\n/g,'</p><p>')
      .replace(/\n/g,'<br>')
      .replace(/^/,'<p>').replace(/$/,'</p>');
  }

  async function sendMessage() {
    const userText = input.value.trim();
    if (!userText || !currentUser) return;

    // Monta query — se há arquivo anexado, prefixa o contexto
    let query = userText;
    const hasAttach = attachedText && attachedName;
    if (hasAttach) {
      query = `[Contexto do arquivo: ${attachedName}]\n${attachedText}\n\nPergunta: ${userText}`;
    }

    input.value = '';
    input.style.height = 'auto';
    btnSend.disabled = true;

    // Exibe mensagem do usuário (sem o bloco de contexto completo — só o que ele digitou)
    addMessage('user', hasAttach ? `📄 ${attachedName}\n\n${userText}` : userText);

    // Remove chip do arquivo após enviar
    if (hasAttach) removeAttachment();

    setTyping(true);

    try {
      const sid  = getSessionId(currentUser.id);
      const data = await apiCall('chat', { query, session_id: sid, user_id: currentUser.id });
      setTyping(false);
      addMessage('bot', data.answer || '(sem resposta)', data.sources);
    } catch(e) {
      setTyping(false);
      showToast('Erro ao enviar mensagem. Tente novamente.');
    } finally {
      btnSend.disabled = false;
      input.focus();
    }
  }

  // ── TOAST ───────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ── ATTACHMENT ──────────────────────────────────────────────────────────────
  const MAX_CHARS = 12000; // ~3000 tokens — limite para não sobrecarregar o prompt
  let attachedText = '';
  let attachedName = '';

  const fileInput      = document.getElementById('file-input');
  const attachmentBar  = document.getElementById('attachment-bar');
  const attachName     = document.getElementById('attach-name');
  const btnAttach      = document.getElementById('btn-attach');
  const btnRemoveAttach = document.getElementById('btn-remove-attach');

  btnAttach.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', async () => {
    const file = fileInput.files[0];
    if (!file) return;
    fileInput.value = '';

    btnAttach.disabled = true;
    btnAttach.style.opacity = '.5';

    try {
      let text = '';
      if (file.name.endsWith('.pdf')) {
        text = await extractPdfText(file);
      } else {
        text = await readAsText(file);
      }

      if (!text.trim()) { showToast('Não foi possível extrair texto do arquivo.'); return; }

      const truncated = text.length > MAX_CHARS;
      attachedText = text.slice(0, MAX_CHARS);
      attachedName = file.name;

      attachName.textContent = file.name;
      attachmentBar.classList.add('visible');
      if (truncated) showToast(`Arquivo grande — usando primeiros ${MAX_CHARS} caracteres`);
      input.focus();
    } catch(e) {
      showToast('Erro ao ler arquivo: ' + e.message);
    } finally {
      btnAttach.disabled = false;
      btnAttach.style.opacity = '1';
    }
  });

  btnRemoveAttach.addEventListener('click', removeAttachment);

  function removeAttachment() {
    attachedText = '';
    attachedName = '';
    attachmentBar.classList.remove('visible');
  }

  function readAsText(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.onerror = () => reject(new Error('Falha na leitura'));
      reader.readAsText(file, 'utf-8');
    });
  }

  async function extractPdfText(file) {
    // PDF.js carregado como módulo ES — acessado via import dinâmico
    const pdfjsLib = await import('https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs');
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.worker.min.mjs';

    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let text = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(s => s.str).join(' ') + '\n';
    }
    return text;
  }

  // ── EVENTOS ─────────────────────────────────────────────────────────────────
  btnSend.addEventListener('click', sendMessage);

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  document.getElementById('btn-new-chat').addEventListener('click', clearSession);
  document.getElementById('btn-logout').addEventListener('click', doLogout);

  btnLogin.addEventListener('click', doLogin);
  inputPwd.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  inputEmail.addEventListener('keydown', e => { if (e.key === 'Enter') inputPwd.focus(); });

  // ── INIT — verifica sessão salva ─────────────────────────────────────────────
  const saved = localStorage.getItem('dt_current_user');
  if (saved) {
    try { startChat(JSON.parse(saved)); }
    catch(e) { localStorage.removeItem('dt_current_user'); }
  }
</script>
</body>
</html>
